name: shea-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: shea-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shea_dev}
      POSTGRES_DB: ${POSTGRES_DB:-shea_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shea} -d ${POSTGRES_DB:-shea_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - shea-dev-network

  redis:
    image: redis:7-alpine
    container_name: shea-dev-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - shea-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: shea-dev-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-shea}:${POSTGRES_PASSWORD:-shea_dev}@postgres:5432/${POSTGRES_DB:-shea_dev}?schema=public
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/prisma.config.ts:/app/prisma.config.ts:ro
      - dev_backend_logs:/app/logs
      - dev_uploads:/app/uploads
      - /app/node_modules
    ports:
      - "3001:3001"
      - "9229:9229"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shea-dev-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: shea-dev-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shea-dev-network

  caddy:
    image: caddy:2-alpine
    container_name: shea-dev-caddy
    restart: unless-stopped
    depends_on:
      - admin
      - backend
    ports:
      - "80:80"
    volumes:
      - ./docker/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - dev_uploads:/srv/uploads:ro
    networks:
      - shea-dev-network

volumes:
  dev_postgres_data:
  dev_redis_data:
  dev_backend_logs:
  dev_uploads:

networks:
  shea-dev-network:
    driver: bridge
